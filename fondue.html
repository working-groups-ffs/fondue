<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แจ้งความท้าทายการสมัครคณะทำงาน</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --primary: #0056b3; --bg: #f4f7f6; --text: #333; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px 15px; margin: 0; }
    .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 30px 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
    .header h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .header p { color: #666; margin: 0; font-size: 15px; }
    
    .section-title { font-size: 17px; font-weight: bold; color: var(--primary); margin: 25px 0 15px 0; padding-left: 10px; border-left: 4px solid var(--primary); }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14.5px; }
    .req { color: #dc3545; }
    
    input[type="text"], input[type="email"], select, textarea {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 15px; box-sizing: border-box; transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(0,86,179,0.2); }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media(max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } }
    
    .file-upload-box { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; background: #fafafa; transition: 0.3s; height: 100%; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;}
    .file-upload-box:hover { border-color: var(--primary); background: #f0f4f8; }
    .file-upload-box input { display: none; }
    .file-name { margin-top: 10px; font-size: 13px; color: #28a745; font-weight: bold; word-break: break-all; }

    .btn-submit { width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; transition: 0.3s; font-family: inherit;}
    .btn-submit:hover { background: #004494; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,86,179,0.3); }
    
    /* Animation สำหรับซ่อน/แสดงกล่องอัปโหลด */
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>🛠️ ระบบแจ้งความท้าทายการสมัครคณะทำงาน</h2>
    <p>พบปัญหาในการใช้งานหรือต้องการอัปเดตเอกสาร สามารถแจ้งได้ที่นี่</p>
  </div>

  <form id="complaintForm">
    
    <div class="section-title">ข้อมูลทั่วไป</div>
    <div class="form-group">
      <label>ท่านพบแบบฟอร์มนี้จากช่องทางใด <span class="req">*</span></label>
      <input type="text" id="source" placeholder="เช่น Facebook, เพื่อนแนะนำ, เว็บไซต์" required>
    </div>
    
    <div class="grid-2">
      <div class="form-group"><label>ชื่อ-นามสกุล <span class="req">*</span></label><input type="text" id="name" placeholder="ชื่อจริง-นามสกุล" required></div>
      <div class="form-group"><label>อีเมลที่ใช้สมัคร <span class="req">*</span></label><input type="email" id="email" placeholder="example@email.com" required></div>
      <div class="form-group"><label>เบอร์โทรศัพท์ <span class="req">*</span></label><input type="text" id="phone" placeholder="08xxxxxxxx" maxlength="10" required></div>
      <div class="form-group"><label>Line ID <span style="color:#888; font-weight:normal;">(ไม่บังคับ)</span></label><input type="text" id="lineId" placeholder="ไอดีไลน์"></div>
    </div>
    <div class="form-group"><label>รหัสสมาชิก <span style="color:#888; font-weight:normal;">(หากมีแล้ว)</span></label><input type="text" id="memberId" placeholder="เช่น FFs260001"></div>

    <div class="section-title">รายละเอียดปัญหา / เรื่องที่แจ้ง</div>
    <div class="form-group">
      <label>ประเภทเรื่องที่แจ้ง <span class="req">*</span></label>
      <select id="probType" required>
        <option value="">-- เลือกประเภท --</option>
        <option value="สมัครสมาชิกไม่ได้">สมัครสมาชิกไม่ได้</option>
        <option value="ไม่ได้รับอีเมลยืนยัน">ไม่ได้รับอีเมลยืนยัน</option>
        <option value="เข้าสู่ระบบไม่ได้">เข้าสู่ระบบไม่ได้</option>
        <option value="ลืมรหัสผ่าน">ลืมรหัสผ่าน</option>
        <option value="ข้อมูลสมาชิกไม่ถูกต้อง">ข้อมูลสมาชิกไม่ถูกต้อง</option>
        <option value="แก้ไขเอกสาร">แก้ไขเอกสาร (โปรไฟล์/สัญญา)</option>
        <option value="อื่น ๆ">อื่น ๆ</option>
      </select>
      <input type="text" id="probTypeOther" style="display:none; margin-top:8px; border-color:var(--primary);" placeholder="โปรดระบุเรื่องที่ต้องการแจ้ง...">
    </div>

    <div class="section-title" id="uploadTitle">อัปโหลดไฟล์ (ถ้ามี)</div>
    
    <!-- 🟢 แบบที่ 1: กล่องอัปโหลดหลักฐาน (สำหรับปัญหาทั่วไป) -->
    <div id="uploadEvidenceSection" class="fade-in">
      <div class="form-group">
        <label class="file-upload-box">
          <div style="font-size: 24px;">📸</div>
          <div style="color: var(--primary); font-weight: bold; margin-top: 5px; font-size: 14px;">อัปโหลดหลักฐานปัญหา</div>
          <div style="font-size: 11px; color: #888; margin-top: 5px;">ภาพหรือวิดีโอ ไม่เกิน 10MB</div>
          <input type="file" id="evidenceFile" accept="image/*,video/*">
          <div class="file-name" id="evidence-name"></div>
        </label>
      </div>
    </div>

    <!-- 🔵 แบบที่ 2: กล่องอัปโหลดโปรไฟล์ & สัญญา (สำหรับแก้ไขเอกสาร) -->
    <div id="uploadDocumentSection" style="display: none;" class="fade-in">
      <div class="grid-2">
        <div class="form-group">
          <label class="file-upload-box">
            <div style="font-size: 24px;">👤</div>
            <div style="color: var(--primary); font-weight: bold; margin-top: 5px; font-size: 14px;">อัปโหลดรูปโปรไฟล์</div>
            <div style="font-size: 11px; color: #888; margin-top: 5px;">เฉพาะไฟล์รูปภาพ ไม่เกิน 10MB</div>
            <input type="file" id="profileFile" accept="image/*">
            <div class="file-name" id="profile-name"></div>
          </label>
        </div>
        <div class="form-group">
          <label class="file-upload-box">
            <div style="font-size: 24px;">📄</div>
            <div style="color: var(--primary); font-weight: bold; margin-top: 5px; font-size: 14px;">อัปโหลดเอกสารสัญญา</div>
            <div style="font-size: 11px; color: #888; margin-top: 5px;">รูปภาพหรือ PDF ไม่เกิน 10MB</div>
            <input type="file" id="contractFile" accept="image/*,application/pdf">
            <div class="file-name" id="contract-name"></div>
          </label>
        </div>
      </div>
    </div>

    <div class="section-title">ข้อมูลทางเทคนิค</div>
    <div class="grid-2">
      <div class="form-group">
        <label>อุปกรณ์ที่ใช้ <span class="req">*</span></label>
        <select id="device" required>
          <option value="">- เลือก -</option>
          <option value="โทรศัพท์มือถือ">โทรศัพท์มือถือ</option>
          <option value="แท็บเล็ต">แท็บเล็ต</option>
          <option value="คอมพิวเตอร์">คอมพิวเตอร์ / โน้ตบุ๊ก</option>
        </select>
      </div>
      <div class="form-group">
        <label>ระบบปฏิบัติการ (OS) <span class="req">*</span></label>
        <select id="os" required>
          <option value="">- เลือก -</option>
          <option value="iOS">iOS (iPhone/iPad)</option>
          <option value="Android">Android</option>
          <option value="Windows">Windows</option>
          <option value="macOS">macOS</option>
          <option value="อื่น ๆ">อื่น ๆ</option>
        </select>
        <input type="text" id="osOther" style="display:none; margin-top:8px; border-color:var(--primary);" placeholder="โปรดระบุระบบปฏิบัติการ...">
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>เบราว์เซอร์ที่ใช้ (Browser) <span class="req">*</span></label>
        <select id="browser" required>
          <option value="">- เลือก -</option>
          <option value="Chrome">Google Chrome</option>
          <option value="Safari">Safari</option>
          <option value="Edge">Microsoft Edge</option>
          <option value="Firefox">Firefox</option>
          <option value="Line In-App">เข้าผ่านแอป Line</option>
          <option value="อื่น ๆ">อื่น ๆ</option>
        </select>
        <input type="text" id="browserOther" style="display:none; margin-top:8px; border-color:var(--primary);" placeholder="โปรดระบุเบราว์เซอร์...">
      </div>
    </div>

    <div class="section-title">รายละเอียด / การติดตามผล</div>
    <div class="form-group">
      <label>คำอธิบายเพิ่มเติม / ข้อเสนอแนะ</label>
      <textarea id="suggestion" rows="3" placeholder="อธิบายสาเหตุการแก้ไขเอกสาร ปัญหาเพิ่มเติม หรือข้อเสนอแนะ..."></textarea>
    </div>
    <div class="form-group">
      <label>ต้องการให้ทีมงานติดต่อกลับทางใด <span class="req">*</span></label>
      <select id="contactVia" required>
        <option value="">-- เลือกช่องทาง --</option>
        <option value="อีเมล">อีเมล</option>
        <option value="โทรศัพท์">โทรศัพท์</option>
        <option value="LINE">LINE</option>
      </select>
    </div>

    <button type="submit" class="btn-submit">ส่งข้อมูลให้ทีมงาน</button>
  </form>
</div>

<script>
  let evidenceData = { base64: null, mime: null, name: null };
  let profileData = { base64: null, mime: null, name: null };
  let contractData = { base64: null, mime: null, name: null };

  // 🎯 ฟังก์ชันสลับกล่องอัปโหลดตามประเภทปัญหา
  document.getElementById('probType').addEventListener('change', function() {
    const uploadEvidence = document.getElementById('uploadEvidenceSection');
    const uploadDocument = document.getElementById('uploadDocumentSection');
    const probTypeOther = document.getElementById('probTypeOther');

    // จัดการกล่อง 'อื่น ๆ'
    if(this.value === 'อื่น ๆ' || this.value === 'อื่นๆ') {
      probTypeOther.style.display = 'block'; probTypeOther.required = true;
    } else {
      probTypeOther.style.display = 'none'; probTypeOther.required = false; probTypeOther.value = '';
    }

    // จัดการกล่องอัปโหลด
    if (this.value === 'แก้ไขเอกสาร' || this.value === 'แก้ไขเอกสาร (โปรไฟล์/สัญญา)') {
      uploadEvidence.style.display = 'none';
      uploadDocument.style.display = 'block';
      // ล้างข้อมูลหลักฐานเก่าทิ้งเผื่อผู้ใช้เปลี่ยนใจ
      evidenceData = { base64: null, mime: null, name: null };
      document.getElementById('evidenceFile').value = '';
      document.getElementById('evidence-name').innerText = '';
    } else {
      uploadEvidence.style.display = 'block';
      uploadDocument.style.display = 'none';
      // ล้างข้อมูลโปรไฟล์/สัญญาเก่าทิ้งเผื่อผู้ใช้เปลี่ยนใจ
      profileData = { base64: null, mime: null, name: null };
      contractData = { base64: null, mime: null, name: null };
      document.getElementById('profileFile').value = '';
      document.getElementById('contractFile').value = '';
      document.getElementById('profile-name').innerText = '';
      document.getElementById('contract-name').innerText = '';
    }
  });

  function setupOtherToggle(selectId, inputId) {
    document.getElementById(selectId).addEventListener('change', function() {
      const otherInput = document.getElementById(inputId);
      if(this.value === 'อื่น ๆ' || this.value === 'อื่นๆ') {
        otherInput.style.display = 'block'; otherInput.required = true;
      } else {
        otherInput.style.display = 'none'; otherInput.required = false; otherInput.value = '';
      }
    });
  }

  setupOtherToggle('os', 'osOther');
  setupOtherToggle('browser', 'browserOther');

  function getFinalValue(selectId, inputId) {
    const val = document.getElementById(selectId).value;
    return (val === 'อื่น ๆ' || val === 'อื่นๆ') ? document.getElementById(inputId).value : val;
  }

  // 🛡️ ฟังก์ชันสำหรับจัดการอ่านไฟล์แยกกัน
  function handleFileUpload(inputId, dataObj, nameDisplayId) {
    document.getElementById(inputId).addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        if(file.size > 10 * 1024 * 1024) { 
           Swal.fire('ขนาดไฟล์ใหญ่เกินไป', 'โปรดแนบไฟล์ขนาดไม่เกิน 10MB', 'warning');
           this.value = ''; document.getElementById(nameDisplayId).innerText = '';
           return;
        }
        document.getElementById(nameDisplayId).innerText = "✅ " + file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
          dataObj.base64 = event.target.result;
          dataObj.mime = file.type;
          dataObj.name = file.name;
        };
        reader.readAsDataURL(file);
      }
    });
  }

  handleFileUpload('evidenceFile', evidenceData, 'evidence-name');
  handleFileUpload('profileFile', profileData, 'profile-name');
  handleFileUpload('contractFile', contractData, 'contract-name');

  document.getElementById('complaintForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // ดึงค่าประเภทปัญหามาเช็คให้ชัวร์
    let finalProbType = getFinalValue('probType', 'probTypeOther');
    if (document.getElementById('probType').value === 'แก้ไขเอกสาร') {
        finalProbType = 'แก้ไขเอกสาร (โปรไฟล์/สัญญา)';
    }

    const payload = {
      source: document.getElementById('source').value,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      lineId: document.getElementById('lineId').value,
      memberId: document.getElementById('memberId').value,
      probType: finalProbType,
      device: document.getElementById('device').value,
      os: getFinalValue('os', 'osOther'),
      browser: getFinalValue('browser', 'browserOther'),
      contactVia: document.getElementById('contactVia').value,
      suggestion: document.getElementById('suggestion').value,
      
      // ส่งข้อมูลทั้ง 3 ไฟล์ไป Backend จะรู้เองว่าต้องดึงตัวไหนไปใช้
      evidenceBase64: evidenceData.base64,
      evidenceMime: evidenceData.mime,
      evidenceName: evidenceData.name,

      profileBase64: profileData.base64,
      profileMime: profileData.mime,
      profileName: profileData.name,

      contractBase64: contractData.base64,
      contractMime: contractData.mime,
      contractName: contractData.name
    };

    Swal.fire({
      title: 'กำลังส่งข้อมูล...',
      text: 'โปรดรอสักครู่ ระบบกำลังส่งข้อมูลให้ทีมงาน',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    // 🎯 เติมลิงก์ Web App URL (ลงท้ายด้วย /exec) ที่ได้จาก Google Apps Script ตรงนี้ครับ
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwT910uisyZ8qS1birybturv4LK3QTrmenSy1lam_4UFwMZykXbzV8S8-N7d7FFkzkDTw/exec";

    fetch(APP_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
      body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(res => {
      if(res.status === 'success') {
        Swal.fire({
          icon: 'success',
          title: '<strong>ส่งข้อมูลสำเร็จ</strong>', 
          html: 'ทีมงานจะดำเนินการภายใน 1–2 วันทำการ', 
          confirmButtonText: 'ตกลง',
          confirmButtonColor: '#0056b3'
        }).then(() => {
          document.getElementById('complaintForm').reset();
          document.getElementById('evidence-name').innerText = '';
          document.getElementById('profile-name').innerText = '';
          document.getElementById('contract-name').innerText = '';
          
          document.getElementById('probTypeOther').style.display = 'none';
          document.getElementById('osOther').style.display = 'none';
          document.getElementById('browserOther').style.display = 'none';
          
          // คืนค่ากล่องอัปโหลดกลับไปเป็นแบบหลักฐานปัญหา
          document.getElementById('uploadEvidenceSection').style.display = 'block';
          document.getElementById('uploadDocumentSection').style.display = 'none';
          
          evidenceData = { base64: null, mime: null, name: null };
          profileData = { base64: null, mime: null, name: null };
          contractData = { base64: null, mime: null, name: null };
        });
      } else {
        Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
      }
    })
    .catch(err => {
      Swal.fire('ข้อผิดพลาดเครือข่าย', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ โปรดลองอีกครั้ง', 'error');
    });
  });
</script>

</body>
</html>
